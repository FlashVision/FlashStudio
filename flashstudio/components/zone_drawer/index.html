<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: transparent; }
.container { position: relative; display: inline-block; }
canvas { cursor: crosshair; border-radius: 8px; display: block; }
.toolbar {
    display: flex; gap: 8px; padding: 8px 0; align-items: center;
}
.btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid #E8E8EF;
    background: #fff; cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all 0.15s;
}
.btn:hover { border-color: #7C3AED; color: #7C3AED; }
.btn-primary { background: #7C3AED; color: #fff; border-color: #7C3AED; }
.btn-primary:hover { background: #6D28D9; }
.btn-danger { color: #EF4444; border-color: #FCA5A5; }
.btn-danger:hover { background: #FEF2F2; }
.status { font-size: 12px; color: #6B7280; margin-left: auto; }
</style>
</head>
<body>
<div class="toolbar">
    <button class="btn btn-danger" onclick="clearAll()">🗑️ Clear</button>
    <button class="btn" onclick="undoLast()">↩️ Undo</button>
    <button class="btn btn-primary" id="closeBtn" onclick="closePolygon()" style="display:none">✅ Close Polygon</button>
    <span class="status" id="status">Click on frame to add points</span>
</div>
<div class="container">
    <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let points = [];
let closed = false;
let bgImage = null;
let mode = 'polygon'; // 'line', 'polygon', 'rect'
let maxPoints = 50;
let imageWidth = 640;
let imageHeight = 480;

function init(config) {
    mode = config.mode || 'polygon';
    maxPoints = (mode === 'line' || mode === 'rect') ? 2 : 50;
    points = config.points || [];
    closed = config.closed || false;
    imageWidth = config.width || 640;
    imageHeight = config.height || 480;

    canvas.width = config.displayWidth || 700;
    canvas.height = config.displayHeight || 525;

    if (config.imageData) {
        bgImage = new Image();
        bgImage.onload = () => draw();
        bgImage.src = config.imageData;
    } else {
        draw();
    }
    updateUI();
}

canvas.addEventListener('click', (e) => {
    if (closed) return;
    if (points.length >= maxPoints) return;

    const rect = canvas.getBoundingClientRect();
    const x = Math.round(e.clientX - rect.left);
    const y = Math.round(e.clientY - rect.top);
    points.push([x, y]);

    if ((mode === 'line' || mode === 'rect') && points.length === 2) {
        closed = true;
    }

    draw();
    updateUI();
    sendValue();
});

function clearAll() {
    points = [];
    closed = false;
    draw();
    updateUI();
    sendValue();
}

function undoLast() {
    if (points.length > 0) {
        points.pop();
        closed = false;
        draw();
        updateUI();
        sendValue();
    }
}

function closePolygon() {
    if (mode === 'polygon' && points.length >= 3) {
        closed = true;
        draw();
        updateUI();
        sendValue();
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (bgImage) {
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = '#1E1E2E';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#6B7280';
        ctx.font = '14px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('No frame — upload video/image first', canvas.width/2, canvas.height/2);
    }

    if (points.length === 0) return;

    const color = '#7C3AED';
    const colorFill = 'rgba(124, 58, 237, 0.12)';

    // Draw shape
    if (mode === 'line' && points.length === 2) {
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        ctx.lineTo(points[1][0], points[1][1]);
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.stroke();
        // Direction indicator
        const mx = (points[0][0] + points[1][0]) / 2;
        const my = (points[0][1] + points[1][1]) / 2;
        ctx.beginPath();
        ctx.arc(mx, my, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#10B981';
        ctx.fill();
    } else if (mode === 'rect' && points.length === 2) {
        const x = Math.min(points[0][0], points[1][0]);
        const y = Math.min(points[0][1], points[1][1]);
        const w = Math.abs(points[1][0] - points[0][0]);
        const h = Math.abs(points[1][1] - points[0][1]);
        ctx.fillStyle = colorFill;
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, w, h);
    } else if (mode === 'polygon' && points.length >= 2) {
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i][0], points[i][1]);
        }
        if (closed) {
            ctx.closePath();
            ctx.fillStyle = colorFill;
            ctx.fill();
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.stroke();
    } else if (points.length >= 2) {
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i][0], points[i][1]);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    // Draw points
    points.forEach((pt, i) => {
        ctx.beginPath();
        ctx.arc(pt[0], pt[1], 7, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Number
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(i + 1), pt[0], pt[1]);
    });
}

function updateUI() {
    const closeBtn = document.getElementById('closeBtn');
    const status = document.getElementById('status');

    if (mode === 'polygon' && points.length >= 3 && !closed) {
        closeBtn.style.display = 'inline-block';
    } else {
        closeBtn.style.display = 'none';
    }

    if (closed) {
        if (mode === 'line') status.textContent = `✅ Line defined (2 points)`;
        else if (mode === 'rect') status.textContent = `✅ Rectangle defined`;
        else status.textContent = `✅ Polygon closed (${points.length} vertices)`;
    } else {
        const needed = (mode === 'line' || mode === 'rect') ? 2 : 3;
        status.textContent = `📍 ${points.length}/${needed}+ points — click to add`;
    }
}

function sendValue() {
    const value = {
        points: points,
        closed: closed,
        mode: mode,
        displayWidth: canvas.width,
        displayHeight: canvas.height,
    };
    // Streamlit component communication
    if (window.parent && window.parent.postMessage) {
        window.parent.postMessage({type: 'streamlit:setComponentValue', value: value}, '*');
    }
    // Also store in a hidden element for polling
    document.title = JSON.stringify(value);
}

// Listen for initialization from Streamlit
window.addEventListener('message', (event) => {
    if (event.data && event.data.type === 'streamlit:render') {
        const args = event.data.args;
        if (args) init(args);
    }
});

// Signal ready
if (window.parent) {
    window.parent.postMessage({type: 'streamlit:componentReady', apiVersion: 1}, '*');
}
</script>
</body>
</html>
